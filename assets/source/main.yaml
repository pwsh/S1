  - platform: status
    name: "ESP32 | Status"
    entity_category: diagnostic

  - platform: template
    name: "Any Presence"
    icon: mdi:home-account
    device_class: presence
    lambda: |-
      static unsigned long last_off = 0;
      bool present = id(target1_distance).state > 0 ||
                     id(target2_distance).state > 0 ||
                     id(target3_distance).state > 0;
      unsigned long now = millis();
      if (present) {
        last_off = now;
        return true;
      }
      return (now - last_off) < (unsigned long)(id(presence_delay).state * 1000.0);

  - platform: template
    name: "Any Movement"
    icon: mdi:motion-sensor
    device_class: motion
    lambda: |-
      float thresh = id(movement_threshold).state;
      return (std::abs(id(target1_speed).state) > thresh) ||
             (std::abs(id(target2_speed).state) > thresh) ||
             (std::abs(id(target3_speed).state) > thresh);

  - platform: template
    id: zone1_presence_bs
    name: "Zone 1 Presence"
    icon: mdi:home-account
    device_class: presence
    lambda: |-
      // [OPT] Polygon evaluation throttled by zone_update_interval (configurable in GUI).
      // update_interval is not valid on template binary sensors; software throttle used instead.
      static unsigned long last_off_1 = 0;
      static unsigned long last_eval_1 = 0;
      static bool last_pres_1 = false;
      unsigned long now = millis();
      unsigned long interval_ms = (unsigned long)(id(zone_update_interval).state * 1000.0f);
      if ((now - last_eval_1) >= interval_ms) {
        last_eval_1 = now;
        const int MAX_PTS = 8;
        float xs[MAX_PTS], ys[MAX_PTS];
        int n = (int) id(zone1_points_count).state;
        if (n >= 3) {
          if (n > MAX_PTS) n = MAX_PTS;
          xs[0]=zone_nz(id(zone1_p1_x).state); ys[0]=zone_nz(id(zone1_p1_y).state);
          xs[1]=zone_nz(id(zone1_p2_x).state); ys[1]=zone_nz(id(zone1_p2_y).state);
          xs[2]=zone_nz(id(zone1_p3_x).state); ys[2]=zone_nz(id(zone1_p3_y).state);
          xs[3]=zone_nz(id(zone1_p4_x).state); ys[3]=zone_nz(id(zone1_p4_y).state);
          xs[4]=zone_nz(id(zone1_p5_x).state); ys[4]=zone_nz(id(zone1_p5_y).state);
          xs[5]=zone_nz(id(zone1_p6_x).state); ys[5]=zone_nz(id(zone1_p6_y).state);
          xs[6]=zone_nz(id(zone1_p7_x).state); ys[6]=zone_nz(id(zone1_p7_y).state);
          xs[7]=zone_nz(id(zone1_p8_x).state); ys[7]=zone_nz(id(zone1_p8_y).state);
          last_pres_1 =
              (id(target1_distance).state > 0 && zone_in_poly(id(target1_x).state, id(target1_y).state, xs, ys, n))
            || (id(target2_distance).state > 0 && zone_in_poly(id(target2_x).state, id(target2_y).state, xs, ys, n))
            || (id(target3_distance).state > 0 && zone_in_poly(id(target3_x).state, id(target3_y).state, xs, ys, n));
        } else { last_pres_1 = false; }
      }
      if (last_pres_1) { last_off_1 = now; return true; }
      return (now - last_off_1) < (unsigned long)(id(zone1_presence_delay).state * 1000.0);

