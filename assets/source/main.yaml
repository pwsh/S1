esphome:
  name: sensy-one
  friendly_name: Sensy One
  name_add_mac_suffix: True
  project:
    name: Sensy-One.S1 mmWave Sensor
    version: v1.2.9
  # [OPT] Shared zone polygon helpers; eliminates 9x duplicated in_poly/nz lambdas.
  includes:
    - components/s1/zone_helpers.h

  on_boot:
  - priority: 800
    then:
      # [OPT] Switch restore_mode replaces explicit on_boot publish for holding/flip_y.
      # Both switches persist their own state to NVS via restore_mode and no longer
      # need a paired internal switch or a global to act as the authoritative source.
      - if:
          condition:
            lambda: 'return id(radar_bt_enabled);'
          then:
            - switch.template.publish:
                id: radar_bluetooth_switch
                state: true
            - lambda: |-
                id(s1_sensor)->turn_bluetooth_on();
          else:
            - switch.template.publish:
                id: radar_bluetooth_switch
                state: false
            - lambda: |-
                id(s1_sensor)->turn_bluetooth_off();

      - if:
          condition:
            lambda: 'return id(radar_single_mode);'
          then:
            - switch.template.publish:
                id: radar_tracking_mode_switch
                state: true
            - lambda: |-
                id(s1_sensor)->set_single_target_tracking();
          else:
            - switch.template.publish:
                id: radar_tracking_mode_switch
                state: false
            - lambda: |-
                id(s1_sensor)->set_multi_target_tracking();

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE: n

wifi:
  ap:
    ssid: "I am Sensy!"
    ap_timeout: 1min

captive_portal: 

logger:
  level: ERROR

api:
  reboot_timeout: 0s

ota:
  - platform: web_server

web_server:
  version: 3

uart:
  id: uart_bus
  tx_pin: GPIO15
  rx_pin: GPIO14
  baud_rate: 256000
  rx_buffer_size: 4096 

globals:
  - id: onboarding_done
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: radar_bt_enabled
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: radar_single_mode
    type: bool
    restore_value: true
    initial_value: 'false'

button:
  - platform: factory_reset
    name: "ESP32 | Factory Reset"
    entity_category: config
    icon: mdi:factory

  - platform: restart
    name: "ESP32 | Restart Module"
    id: restart_btn
    entity_category: config
    icon: mdi:restart

  - platform: template
    name: "RADAR | Restart Module"
    icon: mdi:restart
    entity_category: config
    on_press:
      then:
        - lambda: |-
            id(s1_sensor)->restart_module();

  - platform: template
    name: "RADAR | Factory Reset"
    icon: mdi:factory
    entity_category: config
    on_press:
      then:
        - lambda: |-
            id(s1_sensor)->restore_factory_settings();
        - delay: 250ms
        - lambda: |-
            id(s1_sensor)->restart_module();

switch:
  # [OPT] flip_y (internal) and holding_switch_internal removed.
  # restore_mode on each user-facing switch provides NVS persistence without
  # a paired internal switch or a separate global variable.

  - platform: template
    id: holding_switch
    name: "RADAR | Holding Engine"
    icon: mdi:account-clock
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON   # [OPT] ON matches original default (holding_enabled_bool initial_value: true)

  - platform: template
    id: flip_y_switch
    name: "RADAR | Flip Y Axis"
    icon: mdi:axis-y-rotate-clockwise
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF  # OFF matches original default (flip_y_state initial_value: false)

  - platform: template
    id: radar_bluetooth_switch
    name: "RADAR | Bluetooth"
    icon: mdi:bluetooth
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(radar_bt_enabled) = true;
          id(s1_sensor)->turn_bluetooth_on();
      - delay: 250ms
      - lambda: |-
          id(s1_sensor)->restart_module();
    turn_off_action:
      - lambda: |-
          id(radar_bt_enabled) = false;
          id(s1_sensor)->turn_bluetooth_off();
      - delay: 250ms
      - lambda: |-
          id(s1_sensor)->restart_module();

  - platform: template
    id: obj1_enabled
    name: "Object 1 | Enabled"
    icon: mdi:map-marker-check
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    id: obj2_enabled
    name: "Object 2 | Enabled"
    icon: mdi:map-marker-check
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    id: obj3_enabled
    name: "Object 3 | Enabled"
    icon: mdi:map-marker-check
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    id: radar_tracking_mode_switch
    name: "RADAR | Single Target"
    icon: mdi:account
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(radar_single_mode) = true;   // ON = single
          id(s1_sensor)->set_single_target_tracking();
    turn_off_action:
      - lambda: |-
          id(radar_single_mode) = false;  // OFF = multi
          id(s1_sensor)->set_multi_target_tracking();

