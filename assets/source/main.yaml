      float xs[MAX_PTS], ys[MAX_PTS];
      int n = (int) id(zone3_points_count).state;
      if (n < 3) return 0;
      if (n > MAX_PTS) n = MAX_PTS;
      xs[0]=zone_nz(id(zone3_p1_x).state); ys[0]=zone_nz(id(zone3_p1_y).state);
      xs[1]=zone_nz(id(zone3_p2_x).state); ys[1]=zone_nz(id(zone3_p2_y).state);
      xs[2]=zone_nz(id(zone3_p3_x).state); ys[2]=zone_nz(id(zone3_p3_y).state);
