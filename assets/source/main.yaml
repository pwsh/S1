      int count = 0;
      if (id(target1_distance).state > 0 && zone_in_poly(id(target1_x).state, id(target1_y).state, xs, ys, n)) count++;
      if (id(target2_distance).state > 0 && zone_in_poly(id(target2_x).state, id(target2_y).state, xs, ys, n)) count++;
      if (id(target3_distance).state > 0 && zone_in_poly(id(target3_x).state, id(target3_y).state, xs, ys, n)) count++;
